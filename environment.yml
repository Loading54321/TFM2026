name: tfm-ml-trading
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10

  # Data Science core
  - pandas
  - numpy
  - scipy

  # Machine Learning
  - scikit-learn
  - hmmlearn
  - lightgbm         

  # Jupyter & IDE
  - jupyter
  - jupyterlab
  - ipykernel
  - ipywidgets

  # Data Download
  - yfinance

  # Visualization
  - matplotlib

  # Utilities
  - pip
  - pip:
    # FRED API — descarga variables macroeconómicas
    - fredapi
    # python-dotenv — carga FRED_API_KEY desde .env
    - python-dotenv
